<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HoneyComb{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        honey: '#ffcd4a',
                    }
                }
            }
        }
    </script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .honeycomb-pattern {
            background-color: #fffbf0;
            background-image:
                linear-gradient(30deg, #ffcd4a11 12%, transparent 12.5%, transparent 87%, #ffcd4a11 87.5%, #ffcd4a11),
                linear-gradient(150deg, #ffcd4a11 12%, transparent 12.5%, transparent 87%, #ffcd4a11 87.5%, #ffcd4a11);
            background-size: 80px 140px;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="honeycomb-pattern">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg border-b-4 border-honey">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-3xl">🍯</span>
                        <span class="ml-2 text-2xl font-bold text-gray-800">HoneyComb</span>
                        <span class="ml-2 text-sm text-gray-500">V2G 충·방전 스케줄링 플랫폼</span>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    {% block nav_links %}
                    <a href="{% url 'dashboard:index' %}" class="text-gray-700 hover:text-honey px-3 py-2 rounded-md text-sm font-medium">대시보드</a>
                    <a href="{% url 'dashboard:map' %}" class="text-gray-700 hover:text-honey px-3 py-2 rounded-md text-sm font-medium">입지 지도</a>
                    <a href="{% url 'dashboard:schedule' %}" class="text-gray-700 hover:text-honey px-3 py-2 rounded-md text-sm font-medium">스케줄</a>
                    <a href="{% url 'dashboard:scenario' %}" class="text-gray-700 hover:text-honey px-3 py-2 rounded-md text-sm font-medium">시나리오</a>
                    <a href="{% url 'honeycharge:home' %}" class="bg-honey text-gray-900 px-4 py-2 rounded-md text-sm font-medium hover:bg-yellow-500">꿀차지 앱</a>
                    {% endblock %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
